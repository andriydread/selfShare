services:
  # Database
  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=selfShare
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=selfShare_db

  redis:
    image: redis:7-alpine

  # Flask Web Server
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL
      - CELERY_BROKER_URL
      - ADMIN_PASSWORD
      - JWT_SECRET
    depends_on:
      - db
      - redis

  #Celery Worker
  celery-worker:
    build: .
    command: ["celery", "-A", "celery_app.celery", "worker", "--loglevel=info"]
    environment:
      - DATABASE_URL
      - CELERY_BROKER_URL
    depends_on:
      - db
      - redis

  # Celery Beat
  celery-beat:
    build: .
    command: ["celery", "-A", "celery_app.celery", "beat", "--loglevel=info"]
    environment:
      - DATABASE_URL
      - CELERY_BROKER_URL
    depends_on:
      - db
      - redis

volumes:
  pgdata:
