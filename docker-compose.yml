services:
  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=selfShare
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=selfShare_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfShare -d selfShare_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL
      - ADMIN_PASSWORD
      - JWT_SECRET
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
