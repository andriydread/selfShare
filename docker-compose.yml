services:
  # Database
  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=selfShare
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=selfShare_db

  # Flask Web Server
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL
      - CELERY_BROKER_URL
      - ADMIN_PASSWORD
      - JWT_SECRET
    depends_on:
      - db
      - redis

volumes:
  pgdata:
