<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropZone Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4"
  >
    <!-- LOGIN -->
    <div
      id="login-section"
      class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md"
    >
      <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">
        DropZone Login
      </h2>
      <input
        type="password"
        id="password-input"
        placeholder="Admin Password"
        class="w-full p-3 mb-4 bg-gray-700 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <button
        onclick="handleLogin()"
        class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded font-bold transition"
      >
        Login
      </button>
      <p id="login-error" class="text-red-400 mt-4 text-center hidden">
        Invalid password
      </p>
    </div>

    <!-- DASHBOARD -->
    <div
      id="dashboard-section"
      class="hidden w-full max-w-4xl bg-gray-800 p-8 rounded-lg shadow-lg"
    >
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-blue-400">Your Files</h2>
        <button
          onclick="logout()"
          class="text-gray-400 hover:text-white transition"
        >
          Logout
        </button>
      </div>

      <!-- UPLOAD FORM -->
      <form
        id="upload-form"
        onsubmit="handleUpload(event)"
        class="mb-8 bg-gray-700 p-4 rounded flex flex-col md:flex-row gap-4 items-start md:items-center"
      >
        <input type="file" id="file-input" class="text-gray-300" required />
        <input
          type="text"
          id="desc-input"
          placeholder="Optional description..."
          class="p-2 rounded bg-gray-800 text-white w-full md:w-64 border border-gray-600 focus:outline-none focus:border-blue-500"
        />
        <input
          type="datetime-local"
          id="expires-input"
          class="p-2 rounded bg-gray-800 text-white w-full md:w-64 border border-gray-600 focus:outline-none focus:border-blue-500"
        />
        <button
          type="submit"
          class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded font-bold transition"
        >
          Upload
        </button>
      </form>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-gray-700 text-gray-400">
              <th class="p-3">Filename</th>
              <th class="p-3">Expires At (UTC)</th>
              <th class="p-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="files-table-body"></tbody>
        </table>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
